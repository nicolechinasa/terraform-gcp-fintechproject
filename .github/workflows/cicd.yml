name: Terraform GKE Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_VERSION: "1.5.0"
  GKE_CLUSTER: "bank-cluster"
  GKE_REGION: "us-east1"
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.GKE_REGION }}" \
            -var="cluster_name=${{ env.GKE_CLUSTER }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      # ---------------------------------------------------------------
      # Terraform Destroy — uncomment ONLY when you want to tear down
      # all infrastructure. This will delete the cluster, VPC, subnet,
      # NAT, and router permanently. Use with caution.
      # ---------------------------------------------------------------
      # - name: Terraform Destroy
      #   run: |
      #     terraform destroy -auto-approve \
      #       -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
      #       -var="region=${{ env.GKE_REGION }}" \
      #       -var="cluster_name=${{ env.GKE_CLUSTER }}"

  configure-cluster:
    name: Configure Cluster
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubectl for GKE
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify cluster connection
        run: kubectl get namespaces

  deploy-tooling:
    name: Deploy CertManager, ArgoCD & ingress-nginx
    runs-on: ubuntu-latest
    needs: configure-cluster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubectl for GKE
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Cleanup ArgoCD (if exists)
        run: |
          helm uninstall argocd -n argocd || true
          kubectl delete namespace argocd || true

      # - name: Deploy CertManager
      #   run: |
      #     kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.crds.yaml

      #     helm repo add jetstack https://charts.jetstack.io
      #     helm repo update

      #     helm upgrade --install cert-manager jetstack/cert-manager \
      #       --namespace cert-manager \
      #       --create-namespace \
      #       --version v1.14.4 \
      #       --set installCRDs=false \
      #       --wait

      - name: Deploy ArgoCD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update

          helm upgrade --install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --version 6.7.3 \
            --set server.service.type=ClusterIP \
            --set configs.params."server\.insecure"=true \
            --wait=false

          echo "Waiting for ArgoCD to be ready..."
          kubectl wait --for=condition=available deployment/argocd-server \
            -n argocd --timeout=15m


      - name: Print ArgoCD admin password
        run: |
          echo "=========================================="
          echo "ArgoCD initial admin password:"
          kubectl get secret argocd-initial-admin-secret \
            -n argocd \
            -o jsonpath="{.data.password}" | base64 --decode
          echo ""
          echo "=========================================="
          echo "Port-forward to access ArgoCD UI:"
          echo "kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "Then open: http://localhost:8080"
          echo "Username: admin"
          echo "=========================================="

      - name: Deploy ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update

          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --version 4.10.1 \
            --set controller.service.type=LoadBalancer \
            --timeout 15m \
            --wait

      # - name: Apply ClusterIssuer
      #   run: kubectl apply -f clusterissuer.yaml

      - name: Verify all deployments
        run: |
          # echo "--- cert-manager pods ---"
          # kubectl get pods -n cert-manager
          echo "--- argocd pods ---"
          kubectl get pods -n argocd
          echo "--- ingress-nginx pods ---"
          kubectl get pods -n ingress-nginx
          echo "--- ingress-nginx external IP ---"
          kubectl get svc -n ingress-nginx